<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Games</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
      }
      main {
        width: min(680px, 92vw);
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        padding: 24px;
      }
      h1 {
        margin: 0 0 16px;
      }
      ul {
        margin: 0;
        padding-left: 20px;
        line-height: 1.8;
      }
      a {
        color: #0b57d0;
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .build-time {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #e0e0e0;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>游戏入口</h1>
      <ul>
        <li><a href="./games/demo1/index.html">Demo 1</a></li>
        <li><a href="./games/demo2/index.html">Demo 2</a></li>
        <li><a href="./games/BallBrawl/index.html">BallBrawl（球球大作战）</a></li>
        <li><a href="./games/cutout/index.html">Cutout（图片涂抹抠图工具）</a></li>
        <li><a href="./games/image-crop/index.html">图片裁剪（双图叠加裁剪）</a></li>
        <li><a href="./games/rect-crop/index.html">矩形裁剪（圈选导出）</a></li>
        <li><a href="./batch-image-resizer.html">批量图片缩放工具</a></li>
        <li><a href="./games/yiyuan/index.html">yiyuan（角色展示）</a></li>
      </ul>
      <div class="build-time">编译时间: <span id="buildTime"></span></div>
    </main>
    <script>
      document.getElementById('buildTime').textContent = new Date().toLocaleString('zh-CN');
    </script>
  </body>
</html>
