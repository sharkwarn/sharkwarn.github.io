<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cutout 图片涂抹抠图工具</title>
    <script type="module" crossorigin src="/assets/cutout-D1qg2Vib.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/assets/cutout-gPr61D1x.css">
  </head>
  <body>
    <div id="app" class="app">
      <header class="toolbar">
        <button id="toolbarToggle" class="toolbar-toggle" type="button" aria-expanded="false" aria-controls="toolbarPanel">
          工具面板
        </button>
        <div id="toolbarPanel" class="toolbar-panel">
          <div class="group">
            <label class="file-label">
              <input id="uploadInput" type="file" accept="image/*" />
              上传图片
            </label>
          </div>

          <div class="group tools" role="group" aria-label="工具">
            <button class="tool-btn is-active" data-tool="brush">画笔</button>
            <button class="tool-btn" data-tool="eraser">橡皮擦</button>
            <button class="tool-btn" data-tool="fill">自动填色</button>
            <button class="tool-btn" data-tool="wand">智能魔棒</button>
          </div>

          <div class="group slider-group">
            <label for="brushSize">画笔</label>
            <input id="brushSize" type="range" min="1" max="200" value="28" />
            <span id="brushSizeValue">28</span>
          </div>

          <div class="group slider-group">
            <label for="tolerance">容差</label>
            <input id="tolerance" type="range" min="0" max="150" value="32" />
            <span id="toleranceValue">32</span>
          </div>

          <div class="group slider-group zoom-group">
            <label for="zoomRange">缩放</label>
            <input id="zoomRange" type="range" min="0.1" max="10" value="1" step="0.1" />
            <span id="zoomValue">100%</span>
          </div>

          <div class="group actions">
            <button id="undoBtn">撤销</button>
            <button id="redoBtn">重做</button>
            <button id="clearMaskBtn">清空遮罩</button>
            <button id="exportBtn" class="primary">导出 PNG</button>
          </div>
        </div>
      </header>

      <main class="workspace">
        <div id="emptyTip" class="empty-tip">请选择图片开始抠图</div>
        <div id="gestureHint" class="gesture-hint hidden">
          单指绘制 / 双指缩放画布 / 顶部按钮展开工具
        </div>
        <div id="canvasScroll" class="canvas-scroll hidden">
          <div id="canvasViewport" class="canvas-viewport">
            <canvas id="imageCanvas"></canvas>
            <canvas id="maskCanvas"></canvas>
            <div id="brushCursor" class="brush-cursor hidden"></div>
          </div>
        </div>
      </main>

      <footer class="status-bar">
        <span id="statusText">未加载图片</span>
      </footer>
    </div>

  </body>
</html>
