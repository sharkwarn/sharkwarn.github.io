<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>图片裁剪</title>
    <script type="module" crossorigin src="/assets/imageCrop-CRtyCtQt.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="stylesheet" crossorigin href="/assets/imageCrop-BL4YKjWV.css">
  </head>
  <body>
    <div class="app">
      <header class="toolbar">
        <div class="group">
          <label class="file-label">
            <input id="baseInput" type="file" accept="image/*" />
            上传底图
          </label>
          <label class="file-label">
            <input id="topInput" type="file" accept="image/*" />
            上传裁剪图
          </label>
        </div>

        <div class="group controls">
          <label>缩放
            <input id="scaleInput" type="range" min="0.1" max="5" step="0.01" value="1" />
            <span id="scaleValue">1.00x</span>
          </label>
          <button id="scalePlusBtn" type="button">+0.01</button>
          <button id="resetTopBtn" type="button">重置裁剪图</button>
          <button id="exportBtn" class="primary" type="button">导出 PNG</button>
        </div>
      </header>

      <main class="workspace">
        <aside class="panel">
          <h2>裁剪参数</h2>
          <div class="field-grid">
            <label>X<input id="cropX" type="number" step="1" value="0" /></label>
            <label>Y<input id="cropY" type="number" step="1" value="0" /></label>
            <label>W<input id="cropW" type="number" step="1" value="0" /></label>
            <label>H<input id="cropH" type="number" step="1" value="0" /></label>
          </div>
          <p class="hint">提示：在画布中拖动裁剪图可移动位置；滚轮可缩放。</p>
          <p id="status" class="status">请先上传底图</p>
        </aside>

        <section class="stage-wrap">
          <div id="stageScroll" class="stage-scroll hidden">
            <canvas id="previewCanvas"></canvas>
          </div>
          <div id="emptyTip" class="empty-tip">上传底图后开始编辑</div>
        </section>
      </main>
    </div>

  </body>
</html>
