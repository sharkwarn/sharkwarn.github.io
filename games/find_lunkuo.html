<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轮廓提取演示 - Marching Squares</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --line: #d6dce7;
      --text: #1f2937;
      --muted: #64748b;
      --accent: #0077b6;
      --accent-2: #ff5a5f;
      --point: #ff9f1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #ffffff 0%, var(--bg) 55%);
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 32px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(31, 41, 55, 0.06);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.4px;
    }

    .controls {
      display: grid;
      gap: 12px;
      align-items: center;
    }

    .dropzone {
      position: relative;
      min-height: 92px;
      border: 2px dashed #aac9e4;
      border-radius: 12px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      text-align: center;
      padding: 12px;
      transition: 0.2s ease;
      background: linear-gradient(135deg, #f8fcff 0%, #f3f9ff 100%);
    }

    .dropzone.dragover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .slider-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .field-row {
      display: grid;
      grid-template-columns: auto 120px;
      gap: 12px;
      align-items: center;
    }

    .field-row input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }

    .slider-row input[type="range"] {
      width: 100%;
    }

    .stats {
      color: var(--muted);
      font-size: 14px;
    }

    .canvas-wrap {
      overflow: auto;
      border-radius: 12px;
      border: 1px solid var(--line);
      background:
        linear-gradient(45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8fafc 75%),
        linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    @media (max-width: 720px) {
      .page { padding: 14px 10px 20px; }
      h1 { font-size: 18px; }
      .card { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Marching Squares 轮廓提取演示</h1>
    </section>

    <section class="card controls">
      <label class="dropzone" id="dropzone" for="fileInput">
        <input id="fileInput" type="file" accept="image/*" hidden />
        <span>拖拽图片到这里，或点击上传</span>
      </label>

      <div class="slider-row">
        <label for="threshold">透明度阈值：<strong id="thresholdValue">80</strong></label>
        <input id="threshold" type="range" min="0" max="255" value="80" />
      </div>

      <div class="field-row">
        <label for="vertexCount">顶点数量</label>
        <input id="vertexCount" type="number" min="3" max="500" step="1" value="10" />
      </div>

      <div class="slider-row">
        <label for="detail">细节 Detail：<strong id="detailValue">60</strong></label>
        <input id="detail" type="range" min="0" max="100" value="60" />
      </div>

      <div class="stats" id="stats">请先上传一张带透明背景的图片。</div>
    </section>

    <section class="card canvas-wrap">
      <canvas id="canvas" width="800" height="500"></canvas>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const thresholdInput = document.getElementById('threshold');
    const thresholdValue = document.getElementById('thresholdValue');
    const vertexCountInput = document.getElementById('vertexCount');
    const detailInput = document.getElementById('detail');
    const detailValue = document.getElementById('detailValue');
    const stats = document.getElementById('stats');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const offscreen = document.createElement('canvas');
    const offCtx = offscreen.getContext('2d', { willReadFrequently: true });

    const state = {
      image: null,
      imageData: null,
      rawContour: [],
      contour: [],
      vertices: []
    };

    function fitSize(w, h, maxSide) {
      const scale = Math.min(1, maxSide / Math.max(w, h));
      return {
        w: Math.max(1, Math.round(w * scale)),
        h: Math.max(1, Math.round(h * scale))
      };
    }

    function pointKey(p) {
      return `${p.x.toFixed(4)},${p.y.toFixed(4)}`;
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function samePoint(a, b, eps = 1e-6) {
      return Math.abs(a.x - b.x) <= eps && Math.abs(a.y - b.y) <= eps;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getTargetVertexCount() {
      const n = Number.parseInt(vertexCountInput.value, 10);
      return clamp(Number.isFinite(n) ? n : 10, 3, 500);
    }

    function marchingSquares(imageData, threshold, step = 1) {
      const w = imageData.width;
      const h = imageData.height;
      const alphaAt = (x, y) => imageData.data[(y * w + x) * 4 + 3];
      const half = step / 2;

      const edgePoint = (edge, x, y) => {
        if (edge === 0) return { x: x + half, y: y };          // top
        if (edge === 1) return { x: x + step, y: y + half };   // right
        if (edge === 2) return { x: x + half, y: y + step };   // bottom
        return { x: x, y: y + half };                          // left
      };

      const table = {
        1: [[3, 2]],
        2: [[2, 1]],
        3: [[3, 1]],
        4: [[0, 1]],
        5: [[0, 3], [2, 1]],
        6: [[0, 2]],
        7: [[0, 3]],
        8: [[0, 3]],
        9: [[0, 2]],
        10: [[0, 1], [3, 2]],
        11: [[0, 1]],
        12: [[3, 1]],
        13: [[2, 1]],
        14: [[3, 2]]
      };

      const segments = [];

      for (let y = 0; y < h - step; y += step) {
        for (let x = 0; x < w - step; x += step) {
          const tl = alphaAt(x, y) >= threshold ? 8 : 0;
          const tr = alphaAt(x + step, y) >= threshold ? 4 : 0;
          const br = alphaAt(x + step, y + step) >= threshold ? 2 : 0;
          const bl = alphaAt(x, y + step) >= threshold ? 1 : 0;
          const c = tl | tr | br | bl;
          const pairs = table[c];
          if (!pairs) continue;

          for (let i = 0; i < pairs.length; i++) {
            const [e1, e2] = pairs[i];
            segments.push({ a: edgePoint(e1, x, y), b: edgePoint(e2, x, y), used: false });
          }
        }
      }

      return connectSegments(segments);
    }

    function connectSegments(segments) {
      if (!segments.length) return [];

      const byPoint = new Map();
      const addPoint = (pt, index) => {
        const k = pointKey(pt);
        if (!byPoint.has(k)) byPoint.set(k, []);
        byPoint.get(k).push(index);
      };

      for (let i = 0; i < segments.length; i++) {
        addPoint(segments[i].a, i);
        addPoint(segments[i].b, i);
      }

      const contours = [];

      for (let i = 0; i < segments.length; i++) {
        if (segments[i].used) continue;

        segments[i].used = true;
        const contour = [segments[i].a, segments[i].b];

        let current = contour[contour.length - 1];

        while (true) {
          const k = pointKey(current);
          const candidates = byPoint.get(k) || [];
          let nextSeg = -1;

          for (let j = 0; j < candidates.length; j++) {
            const sIndex = candidates[j];
            if (!segments[sIndex].used) {
              nextSeg = sIndex;
              break;
            }
          }

          if (nextSeg === -1) break;

          segments[nextSeg].used = true;
          const seg = segments[nextSeg];
          const nextPoint = pointKey(seg.a) === pointKey(current) ? seg.b : seg.a;
          contour.push(nextPoint);
          current = nextPoint;

          if (pointKey(current) === pointKey(contour[0])) {
            contour.push(contour[0]);
            break;
          }
        }

        if (contour.length > 4) contours.push(contour);
      }

      if (!contours.length) return [];

      contours.sort((a, b) => contourLength(b) - contourLength(a));
      return contours[0];
    }

    function contourLength(contour) {
      let len = 0;
      for (let i = 1; i < contour.length; i++) {
        len += distance(contour[i - 1], contour[i]);
      }
      return len;
    }

    function sampleVertices(contour, count) {
      if (!contour.length || count <= 0) return [];

      const closed = pointKey(contour[0]) === pointKey(contour[contour.length - 1]);
      const pts = closed ? contour.slice() : contour.concat(contour[0]);

      const cum = [0];
      for (let i = 1; i < pts.length; i++) {
        cum[i] = cum[i - 1] + distance(pts[i - 1], pts[i]);
      }

      const total = cum[cum.length - 1];
      if (total === 0) return [];

      const out = [];
      const step = total / count;

      for (let i = 0; i < count; i++) {
        const target = i * step;
        let segIndex = 1;
        while (segIndex < cum.length && cum[segIndex] < target) segIndex++;

        const prevLen = cum[segIndex - 1];
        const nextLen = cum[segIndex];
        const t = nextLen === prevLen ? 0 : (target - prevLen) / (nextLen - prevLen);

        const p0 = pts[segIndex - 1];
        const p1 = pts[segIndex];
        out.push({
          x: p0.x + (p1.x - p0.x) * t,
          y: p0.y + (p1.y - p0.y) * t
        });
      }

      return out;
    }

    function pointToLineDistance(point, lineStart, lineEnd) {
      const { x: x0, y: y0 } = point;
      const { x: x1, y: y1 } = lineStart;
      const { x: x2, y: y2 } = lineEnd;

      const dx = x2 - x1;
      const dy = y2 - y1;

      if (dx === 0 && dy === 0) {
        return Math.hypot(x0 - x1, y0 - y1);
      }

      const t = ((x0 - x1) * dx + (y0 - y1) * dy) / (dx * dx + dy * dy);
      const tClamped = Math.max(0, Math.min(1, t));
      const projX = x1 + tClamped * dx;
      const projY = y1 + tClamped * dy;
      return Math.hypot(x0 - projX, y0 - projY);
    }

    function rdpSimplify(points, epsilon = 2) {
      if (points.length <= 2) return points.slice();

      const start = points[0];
      const end = points[points.length - 1];
      let maxDist = 0;
      let maxIndex = 0;

      for (let i = 1; i < points.length - 1; i++) {
        const dist = pointToLineDistance(points[i], start, end);
        if (dist > maxDist) {
          maxDist = dist;
          maxIndex = i;
        }
      }

      if (maxDist < epsilon) {
        return [start, end];
      }

      const left = rdpSimplify(points.slice(0, maxIndex + 1), epsilon);
      const right = rdpSimplify(points.slice(maxIndex), epsilon);
      return [...left.slice(0, -1), ...right];
    }

    function contourToRing(contour) {
      if (!contour.length) return [];
      const ring = contour.slice();
      if (ring.length > 1 && samePoint(ring[0], ring[ring.length - 1])) {
        ring.pop();
      }
      return ring;
    }

    function ringToClosedContour(ring) {
      if (!ring.length) return [];
      return [...ring, ring[0]];
    }

    function pathBetween(ring, start, end) {
      const n = ring.length;
      const out = [ring[start]];
      let i = start;
      while (i !== end && out.length <= n + 1) {
        i = (i + 1) % n;
        out.push(ring[i]);
      }
      return out;
    }

    function dedupeConsecutive(points) {
      if (!points.length) return [];
      const out = [points[0]];
      for (let i = 1; i < points.length; i++) {
        if (!samePoint(points[i], out[out.length - 1])) out.push(points[i]);
      }
      return out;
    }

    function simplifyClosedContourRDP(contour, epsilon) {
      const ring = contourToRing(contour);
      if (ring.length <= 3) return ringToClosedContour(ring);

      let splitA = 0;
      let splitB = 1;
      let maxDist = -1;
      for (let i = 1; i < ring.length; i++) {
        const d = distance(ring[splitA], ring[i]);
        if (d > maxDist) {
          maxDist = d;
          splitB = i;
        }
      }

      const path1 = pathBetween(ring, splitA, splitB);
      const path2 = pathBetween(ring, splitB, splitA);
      const simplified1 = rdpSimplify(path1, epsilon);
      const simplified2 = rdpSimplify(path2, epsilon);

      let merged = simplified1.slice(0, -1).concat(simplified2.slice(0, -1));
      merged = dedupeConsecutive(merged);

      if (merged.length < 3) {
        merged = ring.slice(0, Math.min(3, ring.length));
      }
      return ringToClosedContour(merged);
    }

    function fillToTargetByLongestEdges(ring, targetCount) {
      const out = ring.slice();
      if (!out.length) return out;

      while (out.length < targetCount) {
        let bestIndex = 0;
        let longest = -1;
        for (let i = 0; i < out.length; i++) {
          const j = (i + 1) % out.length;
          const len = distance(out[i], out[j]);
          if (len > longest) {
            longest = len;
            bestIndex = i;
          }
        }

        const nextIndex = (bestIndex + 1) % out.length;
        const p0 = out[bestIndex];
        const p1 = out[nextIndex];
        const mid = { x: (p0.x + p1.x) * 0.5, y: (p0.y + p1.y) * 0.5 };
        out.splice(bestIndex + 1, 0, mid);
      }

      return out;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!state.image) {
        ctx.fillStyle = '#64748b';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('上传图片后将在这里显示轮廓结果', canvas.width / 2, canvas.height / 2);
        return;
      }

      ctx.drawImage(state.image, 0, 0, canvas.width, canvas.height);

      if (state.rawContour.length > 1) {
        ctx.beginPath();
        ctx.moveTo(state.rawContour[0].x, state.rawContour[0].y);
        for (let i = 1; i < state.rawContour.length; i++) {
          ctx.lineTo(state.rawContour[i].x, state.rawContour[i].y);
        }
        ctx.strokeStyle = 'rgba(0, 119, 182, 0.45)';
        ctx.lineWidth = Math.max(1, canvas.width / 420);
        ctx.stroke();
      }

      if (state.contour.length > 1) {
        ctx.beginPath();
        ctx.moveTo(state.contour[0].x, state.contour[0].y);
        for (let i = 1; i < state.contour.length; i++) {
          ctx.lineTo(state.contour[i].x, state.contour[i].y);
        }
        ctx.strokeStyle = 'rgba(255, 90, 95, 0.95)';
        ctx.lineWidth = Math.max(1.2, canvas.width / 340);
        ctx.stroke();
      }

      for (let i = 0; i < state.vertices.length; i++) {
        const p = state.vertices[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(3.5, canvas.width / 180), 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 159, 28, 0.95)';
        ctx.fill();
        ctx.strokeStyle = '#1f2937';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    function processImage() {
      if (!state.imageData) return;

      const threshold = Number(thresholdInput.value);
      const detail = Number(detailInput.value);
      const targetVertices = getTargetVertexCount();
      thresholdValue.textContent = String(threshold);
      detailValue.textContent = String(detail);

      const detailRatio = clamp(detail / 100, 0, 1);
      const marchingStep = Math.max(1, Math.round(1 + (1 - detailRatio) * 7));
      const rawContour = marchingSquares(state.imageData, threshold, marchingStep);

      const scale = Math.max(0.75, Math.min(state.imageData.width, state.imageData.height) / 260);
      const epsilon = (1 + (1 - detailRatio) * 10) * scale;

      const simplifiedContour = simplifyClosedContourRDP(rawContour, epsilon);
      let finalVertices = contourToRing(simplifiedContour);

      if (finalVertices.length > targetVertices) {
        finalVertices = sampleVertices(simplifiedContour, targetVertices);
      } else if (finalVertices.length < targetVertices) {
        finalVertices = fillToTargetByLongestEdges(finalVertices, targetVertices);
      }

      state.rawContour = rawContour;
      state.contour = simplifiedContour;
      state.vertices = finalVertices;

      draw();

      const simplifiedCount = contourToRing(simplifiedContour).length;
      stats.textContent = `尺寸 ${state.imageData.width} × ${state.imageData.height}，原始轮廓点 ${rawContour.length}，RDP 后轮廓点 ${simplifiedCount}，实际顶点数 ${finalVertices.length}（目标 ${targetVertices}）`;
    }

    function loadFile(file) {
      if (!file || !file.type.startsWith('image/')) return;

      const url = URL.createObjectURL(file);
      const img = new Image();

      img.onload = () => {
        const size = fitSize(img.naturalWidth, img.naturalHeight, 900);

        canvas.width = size.w;
        canvas.height = size.h;
        offscreen.width = size.w;
        offscreen.height = size.h;

        offCtx.clearRect(0, 0, size.w, size.h);
        offCtx.drawImage(img, 0, 0, size.w, size.h);

        state.image = img;
        state.imageData = offCtx.getImageData(0, 0, size.w, size.h);

        processImage();
        URL.revokeObjectURL(url);
      };

      img.onerror = () => {
        stats.textContent = '图片加载失败，请重试。';
        URL.revokeObjectURL(url);
      };

      img.src = url;
    }

    fileInput.addEventListener('change', (e) => {
      loadFile(e.target.files[0]);
    });

    thresholdInput.addEventListener('input', processImage);
    detailInput.addEventListener('input', processImage);
    vertexCountInput.addEventListener('input', processImage);
    vertexCountInput.addEventListener('change', () => {
      const clamped = getTargetVertexCount();
      vertexCountInput.value = String(clamped);
      processImage();
    });

    ['dragenter', 'dragover'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      loadFile(file);
    });

    draw();
  </script>
</body>
</html>
