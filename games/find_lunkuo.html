<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>轮廓提取演示 - Marching Squares</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --line: #d6dce7;
      --text: #1f2937;
      --muted: #64748b;
      --accent: #0077b6;
      --accent-2: #ff5a5f;
      --point: #ff9f1c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #ffffff 0%, var(--bg) 55%);
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 32px;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 22px rgba(31, 41, 55, 0.06);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.4px;
    }

    .controls {
      display: grid;
      gap: 12px;
      align-items: center;
    }

    .dropzone {
      position: relative;
      min-height: 92px;
      border: 2px dashed #aac9e4;
      border-radius: 12px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      text-align: center;
      padding: 12px;
      transition: 0.2s ease;
      background: linear-gradient(135deg, #f8fcff 0%, #f3f9ff 100%);
    }

    .dropzone.dragover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .slider-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .slider-row input[type="range"] {
      width: 100%;
    }

    .stats {
      color: var(--muted);
      font-size: 14px;
    }

    .canvas-wrap {
      overflow: auto;
      border-radius: 12px;
      border: 1px solid var(--line);
      background:
        linear-gradient(45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(-45deg, #f8fafc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f8fafc 75%),
        linear-gradient(-45deg, transparent 75%, #f8fafc 75%);
      background-size: 20px 20px;
      background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    @media (max-width: 720px) {
      .page { padding: 14px 10px 20px; }
      h1 { font-size: 18px; }
      .card { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Marching Squares 轮廓提取演示</h1>
    </section>

    <section class="card controls">
      <label class="dropzone" id="dropzone" for="fileInput">
        <input id="fileInput" type="file" accept="image/*" hidden />
        <span>拖拽图片到这里，或点击上传</span>
      </label>

      <div class="slider-row">
        <label for="threshold">透明度阈值：<strong id="thresholdValue">80</strong></label>
        <input id="threshold" type="range" min="0" max="255" value="80" />
      </div>

      <div class="stats" id="stats">请先上传一张带透明背景的图片。</div>
    </section>

    <section class="card canvas-wrap">
      <canvas id="canvas" width="800" height="500"></canvas>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById('fileInput');
    const dropzone = document.getElementById('dropzone');
    const thresholdInput = document.getElementById('threshold');
    const thresholdValue = document.getElementById('thresholdValue');
    const stats = document.getElementById('stats');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const offscreen = document.createElement('canvas');
    const offCtx = offscreen.getContext('2d', { willReadFrequently: true });

    const state = {
      image: null,
      imageData: null,
      contour: [],
      vertices: []
    };

    function fitSize(w, h, maxSide) {
      const scale = Math.min(1, maxSide / Math.max(w, h));
      return {
        w: Math.max(1, Math.round(w * scale)),
        h: Math.max(1, Math.round(h * scale))
      };
    }

    function pointKey(p) {
      return `${p.x.toFixed(4)},${p.y.toFixed(4)}`;
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function marchingSquares(imageData, threshold) {
      const w = imageData.width;
      const h = imageData.height;
      const alphaAt = (x, y) => imageData.data[(y * w + x) * 4 + 3];

      const edgePoint = (edge, x, y) => {
        if (edge === 0) return { x: x + 0.5, y: y };       // top
        if (edge === 1) return { x: x + 1, y: y + 0.5 };   // right
        if (edge === 2) return { x: x + 0.5, y: y + 1 };   // bottom
        return { x: x, y: y + 0.5 };                       // left
      };

      const table = {
        1: [[3, 2]],
        2: [[2, 1]],
        3: [[3, 1]],
        4: [[0, 1]],
        5: [[0, 3], [2, 1]],
        6: [[0, 2]],
        7: [[0, 3]],
        8: [[0, 3]],
        9: [[0, 2]],
        10: [[0, 1], [3, 2]],
        11: [[0, 1]],
        12: [[3, 1]],
        13: [[2, 1]],
        14: [[3, 2]]
      };

      const segments = [];

      for (let y = 0; y < h - 1; y++) {
        for (let x = 0; x < w - 1; x++) {
          const tl = alphaAt(x, y) >= threshold ? 8 : 0;
          const tr = alphaAt(x + 1, y) >= threshold ? 4 : 0;
          const br = alphaAt(x + 1, y + 1) >= threshold ? 2 : 0;
          const bl = alphaAt(x, y + 1) >= threshold ? 1 : 0;
          const c = tl | tr | br | bl;
          const pairs = table[c];
          if (!pairs) continue;

          for (let i = 0; i < pairs.length; i++) {
            const [e1, e2] = pairs[i];
            segments.push({ a: edgePoint(e1, x, y), b: edgePoint(e2, x, y), used: false });
          }
        }
      }

      return connectSegments(segments);
    }

    function connectSegments(segments) {
      if (!segments.length) return [];

      const byPoint = new Map();
      const addPoint = (pt, index) => {
        const k = pointKey(pt);
        if (!byPoint.has(k)) byPoint.set(k, []);
        byPoint.get(k).push(index);
      };

      for (let i = 0; i < segments.length; i++) {
        addPoint(segments[i].a, i);
        addPoint(segments[i].b, i);
      }

      const contours = [];

      for (let i = 0; i < segments.length; i++) {
        if (segments[i].used) continue;

        segments[i].used = true;
        const contour = [segments[i].a, segments[i].b];

        let current = contour[contour.length - 1];

        while (true) {
          const k = pointKey(current);
          const candidates = byPoint.get(k) || [];
          let nextSeg = -1;

          for (let j = 0; j < candidates.length; j++) {
            const sIndex = candidates[j];
            if (!segments[sIndex].used) {
              nextSeg = sIndex;
              break;
            }
          }

          if (nextSeg === -1) break;

          segments[nextSeg].used = true;
          const seg = segments[nextSeg];
          const nextPoint = pointKey(seg.a) === pointKey(current) ? seg.b : seg.a;
          contour.push(nextPoint);
          current = nextPoint;

          if (pointKey(current) === pointKey(contour[0])) {
            contour.push(contour[0]);
            break;
          }
        }

        if (contour.length > 4) contours.push(contour);
      }

      if (!contours.length) return [];

      contours.sort((a, b) => contourLength(b) - contourLength(a));
      return contours[0];
    }

    function contourLength(contour) {
      let len = 0;
      for (let i = 1; i < contour.length; i++) {
        len += distance(contour[i - 1], contour[i]);
      }
      return len;
    }

    function sampleVertices(contour, count) {
      if (!contour.length || count <= 0) return [];

      const closed = pointKey(contour[0]) === pointKey(contour[contour.length - 1]);
      const pts = closed ? contour.slice() : contour.concat(contour[0]);

      const cum = [0];
      for (let i = 1; i < pts.length; i++) {
        cum[i] = cum[i - 1] + distance(pts[i - 1], pts[i]);
      }

      const total = cum[cum.length - 1];
      if (total === 0) return [];

      const out = [];
      const step = total / count;

      for (let i = 0; i < count; i++) {
        const target = i * step;
        let segIndex = 1;
        while (segIndex < cum.length && cum[segIndex] < target) segIndex++;

        const prevLen = cum[segIndex - 1];
        const nextLen = cum[segIndex];
        const t = nextLen === prevLen ? 0 : (target - prevLen) / (nextLen - prevLen);

        const p0 = pts[segIndex - 1];
        const p1 = pts[segIndex];
        out.push({
          x: p0.x + (p1.x - p0.x) * t,
          y: p0.y + (p1.y - p0.y) * t
        });
      }

      return out;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!state.image) {
        ctx.fillStyle = '#64748b';
        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('上传图片后将在这里显示轮廓结果', canvas.width / 2, canvas.height / 2);
        return;
      }

      ctx.drawImage(state.image, 0, 0, canvas.width, canvas.height);

      if (state.contour.length > 1) {
        ctx.beginPath();
        ctx.moveTo(state.contour[0].x, state.contour[0].y);
        for (let i = 1; i < state.contour.length; i++) {
          ctx.lineTo(state.contour[i].x, state.contour[i].y);
        }
        ctx.strokeStyle = 'rgba(255, 90, 95, 0.95)';
        ctx.lineWidth = Math.max(1.2, canvas.width / 340);
        ctx.stroke();
      }

      for (let i = 0; i < state.vertices.length; i++) {
        const p = state.vertices[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, Math.max(3.5, canvas.width / 180), 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 159, 28, 0.95)';
        ctx.fill();
        ctx.strokeStyle = '#1f2937';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    function processImage() {
      if (!state.imageData) return;

      const threshold = Number(thresholdInput.value);
      thresholdValue.textContent = String(threshold);

      const contour = marchingSquares(state.imageData, threshold);
      const vertices = sampleVertices(contour, 10);

      state.contour = contour;
      state.vertices = vertices;

      draw();

      stats.textContent = `尺寸 ${state.imageData.width} × ${state.imageData.height}，轮廓点 ${contour.length}，采样顶点 ${vertices.length}`;
    }

    function loadFile(file) {
      if (!file || !file.type.startsWith('image/')) return;

      const url = URL.createObjectURL(file);
      const img = new Image();

      img.onload = () => {
        const size = fitSize(img.naturalWidth, img.naturalHeight, 900);

        canvas.width = size.w;
        canvas.height = size.h;
        offscreen.width = size.w;
        offscreen.height = size.h;

        offCtx.clearRect(0, 0, size.w, size.h);
        offCtx.drawImage(img, 0, 0, size.w, size.h);

        state.image = img;
        state.imageData = offCtx.getImageData(0, 0, size.w, size.h);

        processImage();
        URL.revokeObjectURL(url);
      };

      img.onerror = () => {
        stats.textContent = '图片加载失败，请重试。';
        URL.revokeObjectURL(url);
      };

      img.src = url;
    }

    fileInput.addEventListener('change', (e) => {
      loadFile(e.target.files[0]);
    });

    thresholdInput.addEventListener('input', processImage);

    ['dragenter', 'dragover'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      loadFile(file);
    });

    draw();
  </script>
</body>
</html>
